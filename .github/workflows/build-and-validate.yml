name: Build and Validate Package

on:
  workflow_dispatch:
    
jobs:
  build-and-validate:
    runs-on: self-hosted

    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies
      run: python -m pip install --upgrade pip && pip install build setuptools setuptools-scm

    - name: Build package
      run: python -m build --sdist --wheel --outdir dist

    - name: Validate package structure
      run: |
        pip install check-wheel-contents twine
        check-wheel-contents dist/*.whl
        twine check dist/*

    - name: Test package installation
      run: |
        python -m venv test_wheel_env && test_wheel_env/bin/pip install dist/*.whl && test_wheel_env/bin/python -c "import inference_client; print('Version:', inference_client.__version__); print('Import test passed'); from inference_client import InferenceRequest, InferenceResponse; print('Types import test passed')" && rm -rf test_wheel_env

    - name: Test development installation
      run: |
        python -m venv test_dev_env && test_dev_env/bin/pip install dist/*.whl[dev] && test_dev_env/bin/python -c "import pytest; import ruff; print('Dev tools installation test passed')" && rm -rf test_dev_env

    - name: Test optional dependencies
      run: |
        python -m venv test_openai_env && test_openai_env/bin/pip install dist/*.whl[openai] && test_openai_env/bin/python -c "import openai; print('OpenAI extra installation test passed')" && rm -rf test_openai_env

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist-python-${{ matrix.python-version }}
        path: dist/